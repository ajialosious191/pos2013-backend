<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<style> 
body { 
    font-family: Arial, sans-serif; 
    padding: 20px; 
    width: 300px; 
    background: white;
} 
 
#logo { 
    width: 120px; 
    display: block; 
    margin: 0 auto 10px auto; 
} 
 
h2 { 
    text-align: center; 
    margin-bottom: 10px; 
    color: {{brandColor}}; 
} 
 
.line { 
    border-bottom: 1px dashed #999; 
    margin: 10px 0; 
} 
 
.label { 
    font-weight: bold; 
} 
 
.row { 
    display: flex; 
    justify-content: space-between; 
    margin: 6px 0; 
} 
 
.footer { 
    text-align: center; 
    margin-top: 20px; 
    font-size: 12px; 
    color: #555; 
} 
</style> 
</head> 
<body> 
 
<img id="logo" src="{{logoUrl}}" alt="Merchant Logo" onerror="this.style.display='none'"> 
 
<h2>{{merchantName}}</h2> 
 
<div class="line"></div> 
 
<div class="row"><span class="label">Terminal:</span><span id="terminal"></span></div> 
<div class="row"><span class="label">Transaction ID:</span><span id="txid"></span></div> 
<div class="row"><span class="label">Code:</span><span id="code"></span></div> 
<div class="row"><span class="label">Amount:</span><span id="amount"></span></div> 
<div class="row"><span class="label">Date:</span><span id="date"></span></div> 
 
<div class="line"></div> 
 
<div class="footer">Thank you for your payment</div> 
 
</body> 
</html>
